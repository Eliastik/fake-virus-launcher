<p class="lead-text">{{ 'main.description' | translate }}</p>
<mat-grid-list [cols]="cols" rowHeight="200px" (window:resize)="onResize($event)">
  @for (program of programs; track program) {
    <mat-grid-tile>
      @if (!program.isEasterEgg) {
        <app-program [program]="program"></app-program>
      }
    </mat-grid-tile>
  }
</mat-grid-list>
